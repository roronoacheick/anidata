# ============================================
# Pipeline Logstash - Indexation anime.csv
# ============================================

input {
  file {
    path => "/usr/share/logstash/data_input/anime.csv"
    start_position => "beginning"
    sincedb_path => "/dev/null"
  }
}

filter {
  # Ignorer le header CSV
  if [message] =~ "^MAL_ID," {
    drop { }
  }

  csv {
    separator => ","
    columns => [
      "mal_id", "name", "score", "genres", "english_name",
      "japanese_name", "type", "episodes", "aired", "premiered",
      "producers", "licensors", "studios", "source", "duration",
      "rating", "ranked", "popularity", "members", "favorites",
      "watching", "completed", "on_hold", "dropped",
      "plan_to_watch", "score_10", "score_9", "score_8",
      "score_7", "score_6", "score_5", "score_4", "score_3",
      "score_2", "score_1"
    ]
  }

  # Conversions de types
  mutate {
    convert => {
      "mal_id" => "integer"
      "score" => "float"
      "episodes" => "integer"
      "ranked" => "float"
      "popularity" => "integer"
      "members" => "integer"
      "favorites" => "integer"
      "watching" => "integer"
      "completed" => "integer"
      "on_hold" => "integer"
      "dropped" => "integer"
      "plan_to_watch" => "integer"
    }
    # Supprimer le champ message original
    remove_field => ["message", "@timestamp", "@version", "host", "path", "event"]
  }

  # Transformer les genres en array
  if [genres] {
    mutate {
      split => { "genres" => ", " }
    }
  }

  # Transformer les studios en array
  if [studios] {
    mutate {
      split => { "studios" => ", " }
    }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "anime"
    document_id => "%{mal_id}"
  }

  # Debug : afficher les 5 premiers dans la console
  stdout {
    codec => dots
  }
}
