# ============================================
# 🎌 AniData Lab - Docker Compose
# Stack: Elasticsearch + Logstash + Grafana + Airflow
# Optimisé pour machines 8 GB RAM
# ============================================

services:

  # ==========================================
  # ELASTICSEARCH
  # ==========================================
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:${ELASTIC_VERSION}
    container_name: anidata-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - ES_JAVA_OPTS=${ES_JAVA_OPTS}
      - cluster.name=anidata-cluster
      - bootstrap.memory_lock=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - es_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    mem_limit: 1g
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 30s
      timeout: 10s
      retries: 10
    networks:
      - anidata-network

  # ==========================================
  # GRAFANA (remplace Kibana - 4x plus léger)
  # ==========================================
  grafana:
    image: grafana/grafana-oss:10.3.1
    container_name: anidata-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=anidata
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    mem_limit: 128m
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - anidata-network

  # ==========================================
  # LOGSTASH (profil "ingest" - lancé à la demande)
  # Usage : docker compose --profile ingest up logstash
  # ==========================================
  logstash:
    image: docker.elastic.co/logstash/logstash:${ELASTIC_VERSION}
    container_name: anidata-logstash
    profiles:
      - ingest
    volumes:
      - ./elk/logstash/pipeline:/usr/share/logstash/pipeline:ro
      - ./data:/usr/share/logstash/data_input:ro
    environment:
      - LS_JAVA_OPTS=-Xms256m -Xmx256m
      - xpack.monitoring.enabled=false
    mem_limit: 512m
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - anidata-network

  # ==========================================
  # POSTGRESQL (backend Airflow)
  # ==========================================
  postgres:
    image: postgres:15-alpine
    container_name: anidata-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - pg_data:/var/lib/postgresql/data
    mem_limit: 256m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - anidata-network

  # ==========================================
  # AIRFLOW - Init (exécuté une seule fois)
  # ==========================================
  airflow-init:
    image: apache/airflow:2.8.1-python3.11
    container_name: anidata-airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db init
        airflow users create \
          --username admin \
          --password admin \
          --firstname Admin \
          --lastname AniData \
          --role Admin \
          --email admin@anidata.lab
        airflow users create \
          --username airflow \
          --password airflow \
          --firstname Airflow \
          --lastname User \
          --role Admin \
          --email airflow@anidata.lab || true
        airflow connections add 'elasticsearch_default' \
          --conn-type 'elasticsearch' \
          --conn-host 'elasticsearch' \
          --conn-port '9200' \
          --conn-schema 'http' || true
        echo "✅ Airflow initialisé avec succès !"
    environment:
      - AIRFLOW__CORE__EXECUTOR=${AIRFLOW__CORE__EXECUTOR}
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=${AIRFLOW__DATABASE__SQL_ALCHEMY_CONN}
      - AIRFLOW__CORE__FERNET_KEY=${AIRFLOW__CORE__FERNET_KEY}
      - AIRFLOW__CORE__LOAD_EXAMPLES=${AIRFLOW__CORE__LOAD_EXAMPLES}
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./data:/opt/airflow/data
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - anidata-network

  # ==========================================
  # AIRFLOW - Webserver
  # ==========================================
  airflow-webserver:
    image: apache/airflow:2.8.1-python3.11
    container_name: anidata-airflow-webserver
    command: webserver
    environment:
      - AIRFLOW__CORE__EXECUTOR=${AIRFLOW__CORE__EXECUTOR}
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=${AIRFLOW__DATABASE__SQL_ALCHEMY_CONN}
      - AIRFLOW__CORE__FERNET_KEY=${AIRFLOW__CORE__FERNET_KEY}
      - AIRFLOW__CORE__LOAD_EXAMPLES=${AIRFLOW__CORE__LOAD_EXAMPLES}
      - AIRFLOW__WEBSERVER__SECRET_KEY=${AIRFLOW__WEBSERVER__SECRET_KEY}
      - AIRFLOW__WEBSERVER__EXPOSE_CONFIG=${AIRFLOW__WEBSERVER__EXPOSE_CONFIG}
      - AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION=${AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION}
      - AIRFLOW__API__AUTH_BACKENDS=airflow.api.auth.backend.default
      - _PIP_ADDITIONAL_REQUIREMENTS=pandas elasticsearch apache-airflow-providers-elasticsearch
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./airflow/scripts:/opt/airflow/scripts
      - ./data:/opt/airflow/data
      - ./anidata-scraper:/opt/airflow/anidata-scraper
    ports:
      - "8080:8080"
    mem_limit: 512m
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:8080/health | grep -q 'healthy'"]
      interval: 30s
      timeout: 10s
      retries: 10
    restart: unless-stopped
    networks:
      - anidata-network

  # ==========================================
  # AIRFLOW - Scheduler
  # ==========================================
  airflow-scheduler:
    image: apache/airflow:2.8.1-python3.11
    container_name: anidata-airflow-scheduler
    command: scheduler
    environment:
      - AIRFLOW__CORE__EXECUTOR=${AIRFLOW__CORE__EXECUTOR}
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=${AIRFLOW__DATABASE__SQL_ALCHEMY_CONN}
      - AIRFLOW__CORE__FERNET_KEY=${AIRFLOW__CORE__FERNET_KEY}
      - AIRFLOW__CORE__LOAD_EXAMPLES=${AIRFLOW__CORE__LOAD_EXAMPLES}
      - AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION=${AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION}
      - AIRFLOW__API__AUTH_BACKENDS=airflow.api.auth.backend.default
      - _PIP_ADDITIONAL_REQUIREMENTS=pandas elasticsearch apache-airflow-providers-elasticsearch
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./airflow/scripts:/opt/airflow/scripts
      - ./data:/opt/airflow/data
      - ./anidata-scraper:/opt/airflow/anidata-scraper
    mem_limit: 512m
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - anidata-network

# ==========================================
# VOLUMES
# ==========================================
volumes:
  es_data:
    driver: local
  pg_data:
    driver: local
  grafana_data:
    driver: local

# ==========================================
# NETWORK
# ==========================================
networks:
  anidata-network:
    driver: bridge
