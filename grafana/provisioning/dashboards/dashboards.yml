# ============================================
# Chargement auto des dashboards depuis le dossier
# ============================================

apiVersion: 1

providers:
  - name: "AniData Lab"
    orgId: 1
    folder: "AniData Lab"
    type: file
    disableDeletion: false
    editable: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
