name: CI/CD

# ===========================================================================
# WORKFLOW CI/CD COMPLET — AniData Scraper
# ---------------------------------------------------------------------------
# 1. Lint & Tests (CI)
# 2. Build de l'image Docker Airflow custom (DAGs + scraper inclus)
# 3. Push de l'image sur GitHub Container Registry (GHCR)
#
# Cette version remplace ci.yml dès qu'on a abordé la séance 3 (CD).
# Vous pouvez supprimer ci.yml ou le laisser : les deux workflows peuvent
# coexister sans problème.
# ===========================================================================

on:
  push:
    branches: [main, Test, nermine, cheickna]
    tags:
      - "v*.*.*"
  pull_request:
    branches: [main, Test]

concurrency:
  group: cicd-${{ github.ref }}
  cancel-in-progress: true

# Permissions du GITHUB_TOKEN au niveau du workflow.
# Ces permissions sont nécessaires pour pousser sur GHCR.
permissions:
  contents: read       # lecture du code (checkout)
  packages: write      # écriture sur GHCR

jobs:
  # ---------------------------------------------------------------------------
  # JOB 1 : LINT
  # ---------------------------------------------------------------------------
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: anidata-scraper
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: anidata-scraper/requirements-dev.txt

      - run: pip install ruff
      - run: ruff check anidata_scraper/ tests/

  # ---------------------------------------------------------------------------
  # JOB 2 : TESTS
  # ---------------------------------------------------------------------------
  tests:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: anidata-scraper
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: anidata-scraper/requirements-dev.txt

      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -e .

      - run: pytest --cov=anidata_scraper --cov-report=term-missing

  # ---------------------------------------------------------------------------
  # JOB 3 : BUILD & PUSH IMAGE DOCKER
  # ---------------------------------------------------------------------------
  # Ne s'exécute QUE si lint ET tests passent (needs: [lint, tests]).
  # Ne pousse l'image QUE sur push vers main ou sur création d'un tag.
  # Sur les Pull Requests, on builde mais on ne pousse pas (pour valider que
  # l'image se construit correctement, sans polluer le registry).
  # ---------------------------------------------------------------------------
  build-and-push:
    name: Build & Push Docker
    needs: [lint, tests]
    runs-on: ubuntu-latest

    # Variables d'environnement réutilisées dans plusieurs steps
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}-airflow

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      # Buildx active les fonctionnalités avancées (cache, multi-arch).
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Connexion à GHCR avec le GITHUB_TOKEN automatiquement fourni par GitHub.
      # Pas de secret à configurer manuellement.
      - name: Login GHCR
        # On ne se connecte pas sur les PR (puisqu'on ne pushera pas).
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # docker/metadata-action génère automatiquement les tags d'image
      # selon le contexte (branche, tag, SHA du commit). C'est le standard
      # de l'écosystème — ne pas réinventer la roue.
      - name: Génération des tags d'image
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Tag latest UNIQUEMENT sur les push vers main (prod)
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            # Tag test UNIQUEMENT sur les push vers Test (integration)
            type=raw,value=test,enable=${{ github.ref == 'refs/heads/Test' }}
            # Tag avec le nom de branche pour les feature branches (nermine, cheickna)
            type=ref,event=branch
            # Tag avec le SHA court du commit — toujours present
            type=sha,prefix=sha-,format=short
            # Tag avec la version semantique sur les tags vX.Y.Z
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build & Push de l'image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          # Push uniquement hors Pull Request
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache GitHub Actions pour accélérer les builds suivants
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Résumé du déploiement
        if: github.event_name != 'pull_request'
        run: |
          echo "## ✅ Image publiée sur GHCR" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tags déployés :**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Pour pull localement :" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  # ---------------------------------------------------------------------------
  # JOB 4 : DÉCLENCHER LE DAG 02 (SCRAPING)
  # ---------------------------------------------------------------------------
  # S'exécute après le push sur les branches de déploiement
  # Déclenche automatiquement le DAG 02 qui scrape le site
  # Puis DAG 03 se déclenche automatiquement après DAG 02 (via ExternalTaskSensor)
  # ---------------------------------------------------------------------------
  trigger-dag:
    name: Déclencher DAG 02 Scraper
    needs: [build-and-push]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/Test' || github.ref == 'refs/heads/cheickna' || github.ref == 'refs/heads/nermine')
    continue-on-error: true
    
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Installer les dépendances
        run: |
          pip install requests

      - name: 🚀 Déclencher DAG 02 (Scraping) - OPTIONNEL
        env:
          AIRFLOW_HOST: ${{ secrets.AIRFLOW_HOST }}
          AIRFLOW_USER: ${{ secrets.AIRFLOW_USER }}
          AIRFLOW_PASSWORD: ${{ secrets.AIRFLOW_PASSWORD }}
        run: |
          if [ -z "$AIRFLOW_HOST" ]; then
            echo "⚠️  AIRFLOW_HOST non configuré - job optionnel"
            echo "Pour configurer : Settings → Secrets and variables → Actions"
            exit 0
          fi
          python trigger_dag_scraper.py || echo "⚠️  Trigger DAG échoué (Airflow peut ne pas être accessible)"

      - name: ℹ️ Information
        run: |
          echo "## ℹ️ Trigger DAG (Optionnel)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Ce job tente de déclencher DAG 02 mais ne fait pas échouer le workflow." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Pour activer ce job :**" >> $GITHUB_STEP_SUMMARY
          echo "1. Ajouter les secrets GitHub (Settings → Secrets)" >> $GITHUB_STEP_SUMMARY
          echo "2. Consulter GITHUB_ACTIONS_SETUP.md pour les détails" >> $GITHUB_STEP_SUMMARY
