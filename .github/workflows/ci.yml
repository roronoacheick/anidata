name: CI

# ===========================================================================
# WORKFLOW CI — AniData Scraper
# ---------------------------------------------------------------------------
# Lance le lint et les tests à chaque push et à chaque Pull Request.
# Utilisé pour la séance 2 (CI seule, sans déploiement).
#
# La progression vers la version complète CI/CD avec build+push d'image
# Docker se fait dans .github/workflows/ci-cd.yml (séance 3).
# ===========================================================================

# Évènements qui déclenchent le workflow
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Empêche que deux exécutions tournent en parallèle sur la même branche :
# le nouveau push annule l'ancien run (économise du temps de runner).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  # ---------------------------------------------------------------------------
  # JOB 1 : LINT
  # Vérifie le style de code avec ruff. Très rapide (~10 secondes).
  # ---------------------------------------------------------------------------
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installation de Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Installation de ruff
        run: pip install ruff

      - name: Vérification du style
        run: ruff check anidata_scraper/ tests/

  # ---------------------------------------------------------------------------
  # JOB 2 : TESTS
  # Exécute pytest avec couverture sur Python 3.10 et 3.11.
  # La matrice permet de tester plusieurs versions en parallèle.
  # ---------------------------------------------------------------------------
  tests:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      # fail-fast: false continue les autres jobs même si un échoue
      # (utile pour voir si le bug est lié à une version spécifique)
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installation de Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Installation des dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Exécution des tests avec couverture
        run: pytest --cov=anidata_scraper --cov-report=term-missing --cov-report=xml

      - name: Upload du rapport de couverture (artefact)
        # Uniquement sur Python 3.10 pour éviter les doublons.
        if: matrix.python-version == '3.10'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

  # ---------------------------------------------------------------------------
  # JOB 3 : DÉCLENCHER DAG SCRAPER (si tests OK)
  # Appelle le script Python qui va requêter l'API Airflow
  # ---------------------------------------------------------------------------
  trigger-scraper:
    name: Déclencher DAG Scraper
    runs-on: ubuntu-latest
    needs: tests
    if: success()

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installation Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Installation de requests
        run: pip install requests

      - name: Lancer le script de déclenchement
        run: python trigger_dag_scraper.py
        env:
          AIRFLOW_HOST: ${{ secrets.AIRFLOW_HOST }}
          AIRFLOW_USER: ${{ secrets.AIRFLOW_USER || 'admin' }}
          AIRFLOW_PASSWORD: ${{ secrets.AIRFLOW_PASSWORD || 'admin' }}
