name: CI

# ===========================================================================
# WORKFLOW CI — AniData Scraper
# ---------------------------------------------------------------------------
# Lance le lint et les tests à chaque push et à chaque Pull Request.
# Le code du scraper est dans anidata-scraper/ donc on utilise
# `working-directory` pour que toutes les commandes s'exécutent depuis là.
# ===========================================================================

on:
  push:
    branches: [main, Test, nermine, cheickna]
  pull_request:
    branches: [main, Test]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # JOB 1 : LINT
  # ---------------------------------------------------------------------------
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: anidata-scraper
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installation de Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: anidata-scraper/requirements-dev.txt

      - name: Installation de ruff
        run: pip install ruff

      - name: Vérification du style
        run: ruff check anidata_scraper/ tests/

  # ---------------------------------------------------------------------------
  # JOB 2 : TESTS
  # ---------------------------------------------------------------------------
  tests:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: anidata-scraper
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installation de Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: anidata-scraper/requirements-dev.txt

      - name: Installation des dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -e .

      - name: Exécution des tests avec couverture
        run: pytest --cov=anidata_scraper --cov-report=term-missing --cov-report=xml

      - name: Upload du rapport de couverture (artefact)
        if: matrix.python-version == '3.10'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: anidata-scraper/coverage.xml
          retention-days: 7
